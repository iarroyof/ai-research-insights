# Reward shape registry for lung_factuality_lab.
# Purpose: prevent iterative evaluation from revisiting known weaker reward/evaluator shapes.
# A shape is accepted only when live endpoint results improve on the comparable prior live run.

current_best_shape: shape4
current_stage: shape7l_caf_ecm_guard_replay_cleared_stratified_guard_pending
selection_rule: >-
  Prefer the highest live-endpoint average reward on comparable scenarios, with fewer
  high-severity evaluator false positives and no regression in trap resistance. Replay-only
  improvements are diagnostic, not sufficient for promotion.


evaluation_ladder:
  diagnostic_gate:
    conversations: 1
    purpose: Inspect one failing live trace before editing.
  family_fit_gates:
    correction_scope: evals/lung_factuality_lab/configs/generated_microfit_correction_scope.yaml
    tam_cd8: evals/lung_factuality_lab/configs/generated_microfit_tam_cd8.yaml
    citation_drift: evals/lung_factuality_lab/configs/generated_microfit_citation_drift.yaml
  stratified_guard_gates:
    sentinel_a: evals/lung_factuality_lab/configs/generated_sentinel_a.yaml
    sentinel_b: evals/lung_factuality_lab/configs/generated_sentinel_b.yaml
    sentinel_c: evals/lung_factuality_lab/configs/generated_sentinel_c.yaml
  protected_holdout: evals/lung_factuality_lab/configs/generated_semantic_drift_holdout_v1.yaml
  promotion_rule: >-
    Replay isolates evaluator changes. Live family fit plus a stratified guard must improve
    or remain stable before Stage 2 is rerun; Stage 3 remains protected until confidence is high.

shape_experiment_template:
  required_fields:
    - hypothesis
    - target_failure_family
    - fit_conversations
    - guard_conversations
    - holdout_conversations
    - replay_metrics
    - live_metrics
    - family_deltas
    - failure_category_deltas
    - promotion_decision
    - blocked_reason

