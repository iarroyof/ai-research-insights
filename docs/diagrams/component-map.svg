<style>text{font-family:Arial,Helvetica,sans-serif}.title{font-size:30px;font-weight:700;fill:#102a43}.box-title{font-size:18px;font-weight:700;fill:#102a43}.box-body{font-size:13px;fill:#243b53}.label{font-size:13px;font-weight:700;fill:#284b63}.box{fill:#f7fbff;stroke:#2f6f8f;stroke-width:2;rx:8}.accent{fill:#e7f5ec;stroke:#2f855a}.store{fill:#fff8e6;stroke:#b7791f}.gpu{fill:#f3edff;stroke:#6b46c1}</style>
