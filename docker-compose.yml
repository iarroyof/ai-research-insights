services:
  caddy:
    image: caddy:2
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:8080"
      - "${CADDY_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [api]
    networks:
      - ai_research_insights_net

  api:
    build:
      context: .
      dockerfile: ${API_DOCKERFILE:-services/api/Dockerfile.hosted}
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      - APP_CONFIG=/app/config/default.yaml
      - PYTHONPATH=/app
      - API_URL=http://api:8080
      - API_KEY=${API_KEY}

      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}

      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}

      - LLM_BASE_URL=${LLM_BASE_URL:-http://llm:8000/v1}
      - LLM_MODEL_ID=${LLM_MODEL_ID}
      - LLM_CHAT_PROVIDER=${LLM_CHAT_PROVIDER:-nvidia}
      - CONTEXT_MANAGER_PROVIDER=${CONTEXT_MANAGER_PROVIDER:-nvidia}
      - CONTEXT_MANAGER_MODEL=${CONTEXT_MANAGER_MODEL:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-nvidia/llama-3.3-nemotron-super-49b-v1.5}
      - NVIDIA_MAX_TOKENS=${NVIDIA_MAX_TOKENS:-2048}
      - NVIDIA_REASONING_EFFORT=${NVIDIA_REASONING_EFFORT:-}
      - NLI_PROVIDER=${NLI_PROVIDER:-hf_api}
      - NLI_MODEL=${NLI_MODEL:-pritamdeka/PubMedBERT-MNLI-MedNLI}
      - NLI_ENDPOINT=${NLI_ENDPOINT:-}
      - HF_API_TOKEN=${HF_API_TOKEN:-}
      - HF_API_BASE_URL=${HF_API_BASE_URL:-https://router.huggingface.co/hf-inference/models}
      - HF_API_TIMEOUT_SEC=${HF_API_TIMEOUT_SEC:-45}
      - NLI_HF_API_MAX_RETRIES=${NLI_HF_API_MAX_RETRIES:-2}
      - NLI_HF_API_RETRY_BACKOFF_SEC=${NLI_HF_API_RETRY_BACKOFF_SEC:-2.0}
      - NLI_MIN_ENTAILMENT=${NLI_MIN_ENTAILMENT:-0.55}
      - NLI_CONTRADICTION_THRESHOLD=${NLI_CONTRADICTION_THRESHOLD:-0.45}
      - ZERO_SHOT_PROVIDER=${ZERO_SHOT_PROVIDER:-hf_api}
      - ZERO_SHOT_MODEL=${ZERO_SHOT_MODEL:-facebook/bart-large-mnli}
      - ZERO_SHOT_HF_API_BASE_URL=${ZERO_SHOT_HF_API_BASE_URL:-https://router.huggingface.co/hf-inference/models}
      - ZERO_SHOT_HF_API_TIMEOUT_SEC=${ZERO_SHOT_HF_API_TIMEOUT_SEC:-45}
      - ZERO_SHOT_HF_API_MAX_RETRIES=${ZERO_SHOT_HF_API_MAX_RETRIES:-2}
      - ZERO_SHOT_HF_API_RETRY_BACKOFF_SEC=${ZERO_SHOT_HF_API_RETRY_BACKOFF_SEC:-2.0}

    volumes:
      - ./services/api:/app
      - ./config:/app/config:ro
      # Eval lab mounted read-write so run_batch/run_single can execute inside the
      # api container (deps already present) and persist runs/ to the host.
      - ./evals:/app/evals
    depends_on:
      - postgres
      - opensearch
      - redis
      - neo4j
      - minio
      - grobid
      - corenlp-adapter
    ports:
      - "${API_HOST_PORT:-18081}:8080"
    networks:
      - ai_research_insights_net

  worker-cpu:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      args:
        REQUIREMENTS_FILE: ${WORKER_REQUIREMENTS_FILE:-services/api/requirements.hosted.txt}
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    command: ["python", "services/worker/worker.py", "cpu"]
    environment:
      - APP_CONFIG=/app/config/default.yaml
      - PYTHONPATH=/app
    volumes:
      - ./services/api:/app
      - ./services/worker:/app/services/worker
      - ./config:/app/config:ro
    depends_on: [api, redis]
    networks:
      - ai_research_insights_net

  worker-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      args:
        REQUIREMENTS_FILE: ${WORKER_GPU_REQUIREMENTS_FILE:-services/api/requirements.txt}
    runtime: ${DOCKER_GPU_RUNTIME:-nvidia}
    command: ["python", "services/worker/worker.py", "gpu"]
    environment:
      - APP_CONFIG=/app/config/default.yaml
      - PYTHONPATH=/app
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./services/api:/app
      - ./services/worker:/app/services/worker
      - ./config:/app/config:ro
    depends_on: [api, llm, redis]
    networks:
      - ai_research_insights_net

  # Infra
  redis:
    image: redis:7-alpine
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    networks:
      - ai_research_insights_net

  postgres:
    image: postgres:16
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ai_insights
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ai_research_insights_net

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - osdata:/usr/share/opensearch/data
    networks:
      - ai_research_insights_net
    ports:
      - "${OPENSEARCH_HOST_PORT:-19200}:9200"

  neo4j:
    image: neo4j:5.23.0-community
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    environment:
      - NEO4J_AUTH=neo4j/neo4j_pass
      # Optional: increase memory for better performance
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4jdata:/data
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # HTTP (Browser UI)
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt protocol (API access)
    networks:
      - ai_research_insights_net

  minio:
    image: minio/minio
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio_pass
    volumes:
      - miniodata:/data
    networks:
      - ai_research_insights_net

  grobid:
    image: lfoppiano/grobid:0.7.3
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    environment:
      - GROBID_WORKERS=4
    networks:
      - ai_research_insights_net

  llm:
    profiles: ["gpu"]
    image: vllm/vllm-openai:latest
    runtime: ${DOCKER_GPU_RUNTIME:-nvidia}
    command: ["--model", "HuggingFaceH4/zephyr-7b-beta", "--gpu-memory-utilization", "0.85"]
    environment:
      - HF_HOME=/models
    volumes:
      - /mnt/data/huggingface/hub:/models
    networks:
      - ai_research_insights_net

  models-init:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: services/models-init/Dockerfile
    runtime: ${DOCKER_GPU_RUNTIME:-nvidia}
    environment:
      - HF_HOME=/models
      - LLM_MODEL_ID=${LLM_MODEL_ID:-HuggingFaceH4/zephyr-7b-beta}
    volumes:
      - /mnt/data/huggingface/hub:/models
    networks:
      - ai_research_insights_net

  # --- REBEL extractor (main) ---
  rebel-extractor:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: services/rebel-extractor/Dockerfile
    runtime: ${DOCKER_GPU_RUNTIME:-nvidia}
    environment:
      HF_HOME: /models
      REBEL_MODEL_ID: Babelscape/rebel-large
      REBEL_DEVICE: auto
      REBEL_FP16: "0"
      REBEL_USE_BEAM: "1"
      REBEL_NUM_BEAMS: "6"
      REBEL_MAX_NEW_TOKENS: "128"
      REBEL_TEMPERATURE: "1.0"
      REBEL_TOP_P: "1.0"
      REBEL_MIN_SCORE: "0.1"
      REBEL_MAX_TRIPLES: "10"
      REBEL_BATCH_SIZE: "8"
      REBEL_HTTP_TIMEOUT: "300"
    volumes:
      - /mnt/data/huggingface/hub:/models
    networks:
      - ai_research_insights_net

  # --- Stanford CoreNLP + adapter (fallback) ---
  corenlp:
    image: nlpbox/corenlp:latest
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    command:
      - sh
      - -lc
      - >
        java -Xms4g -Xmx8g -cp "*" edu.stanford.nlp.pipeline.StanfordCoreNLPServer
        -port 9000 -timeout 600000 -threads 4
        -quiet true
        -preload tokenize,ssplit,pos,lemma,depparse,natlog,openie
        -annotators tokenize,ssplit,pos,lemma,depparse,natlog,openie
    environment:
      - TIMEOUT_MILLISECONDS=150000
    networks:
      - ai_research_insights_net

  corenlp-adapter:
    build:
      context: .
      dockerfile: services/corenlp-adapter/Dockerfile
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    environment:
      - CORENLP_URL=http://corenlp:9000
    depends_on: [corenlp]
    networks:
      - ai_research_insights_net

  # --- Streamlit UI ---
  streamlit:
    build:
      context: .
      dockerfile: services/streamlit/Dockerfile
    runtime: ${DOCKER_CPU_RUNTIME:-runc}
    environment:
      - APP_CONFIG=/app/config/default.yaml
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8080}
      - API_KEY=${API_KEY}
    volumes:
      - ./services/streamlit:/app
      - ./config:/app/config:ro
    depends_on: [api]
    # Remove port exposure since Caddy will proxy
    # ports:
    #   - "8501:8501"
    networks:
      - ai_research_insights_net

volumes:
  caddy_data: {}
  caddy_config: {}
  pgdata: {}
  osdata: {}
  neo4jdata: {}
  miniodata: {}

networks:
  ai_research_insights_net:
    name: ai_research_insights_net
    driver: bridge
