app:
  name: ai-research-insights
  env: prod
  log_level: INFO
  sse_heartbeat_seconds: 10
  allow_cors_origins: []

security:
  require_api_key: true
  api_key: ${API_KEY}
  enable_hmac: false
  rate_limit_per_min: 120

multi_tenancy:
  strategy: rls
  default_tenant: default
  enforce: true

postgres:
  dsn: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

opensearch:
  endpoint: http://opensearch:9200
  index_prefix: ""
  use_vectors: true
  vector_dim: 384
  bm25_k: 50
  vec_k: 50
  fusion_weight: 0.5

neo4j:
  uri: bolt://neo4j:7687
  user: ${NEO4J_USER}
  password: ${NEO4J_PASSWORD}

minio:
  endpoint: http://minio:9000
  access_key: ${MINIO_ROOT_USER}
  secret_key: ${MINIO_ROOT_PASSWORD}
  bucket: papers

llm:
  base_url: ${LLM_BASE_URL:-http://llm:8000/v1}
  model: ${LLM_MODEL_ID:-}
  chat_provider: ${LLM_CHAT_PROVIDER:-nvidia}
  max_input_tokens: ${LLM_MAX_INPUT_TOKENS:-128000}
  max_output_tokens: ${LLM_MAX_OUTPUT_TOKENS:-2048}
  temperature: 0.2
  top_p: 1.0
  context_manager_provider: ${CONTEXT_MANAGER_PROVIDER:-nvidia}
  context_manager_model: ${CONTEXT_MANAGER_MODEL:-}
  nvidia_base_url: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
  nvidia_api_key: ${NVIDIA_API_KEY:-}
  nvidia_model: ${NVIDIA_MODEL:-nvidia/llama-3.3-nemotron-super-49b-v1.5}
  nvidia_max_tokens: ${NVIDIA_MAX_TOKENS:-4096}
  provider_timeout_sec: ${LLM_PROVIDER_TIMEOUT_SEC:-300}
  nvidia_reasoning_effort: ${NVIDIA_REASONING_EFFORT:-}
  nvidia_enable_thinking: null
  agent_models:
    frame:
      provider: nvidia
      model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
      max_tokens: 900
    context_manager:
      provider: nvidia
      model: "nvidia/nemotron-3-super-120b-a12b"
      max_tokens: 1024
      reasoning_effort: "medium"
    answer:
      provider: nvidia
      model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
      max_tokens: 4096
    reflection:
      provider: nvidia
      model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
      max_tokens: 512
    # Tier-1 intent router (P-7): small fast NIM, classification only.
    # MNLI fallback (facebook/bart-large-mnli via app.services.zero_shot) is
    # env-driven (ZERO_SHOT_*) and kicks in when this NIM is unreachable.
    router:
      provider: nvidia
      model: "nvidia/nemotron-3-nano-30b-a3b"
      # Nemotron models spend budget on reasoning before the final content; a
      # tiny cap (e.g. 40) yields EMPTY content. 256 reliably returns the JSON.
      max_tokens: 256
    # P-1: LLM-NLI fallback (nli.py _llm_nli) — generative classifier used only
    # when the HF MNLI path is unavailable. super-49b emits variable-length
    # reasoning and returns EMPTY content under a tight cap (verified empty at
    # 256, sometimes at 512); 1024 gives ample headroom for the compact JSON.
    # (HF MNLI primary stays on memory.nli_model = PubMedBERT-MNLI-MedNLI and is
    # the factuality authority; this LLM path is a degraded fallback only.)
    nli:
      provider: nvidia
      model: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
      max_tokens: 1024

memory:
  enabled: true
  working_buffer_turns: 8
  working_buffer_token_budget: ${MEMORY_WORKING_BUFFER_TOKEN_BUDGET:-48000}
  memory_k: ${MEMORY_K:-16}
  triplet_k: ${MEMORY_TRIPLET_K:-16}
  web_k: ${MEMORY_WEB_K:-6}
  token_budget_ratio: ${MEMORY_TOKEN_BUDGET_RATIO:-0.80}
  episodic_summary_turns: ${MEMORY_EPISODIC_SUMMARY_TURNS:-6}
  lifecycle_update_k: ${MEMORY_LIFECYCLE_UPDATE_K:-80}
  eviction_importance_threshold: ${MEMORY_EVICTION_IMPORTANCE_THRESHOLD:-0.25}
  allow_web_search_default: false
  use_llm_reflection: false
  shared_policy_enabled: false
  reward_trace_enabled: true
  auto_context_enabled: ${AUTO_CONTEXT_ENABLED:-true}
  auto_context_k: ${AUTO_CONTEXT_K:-12}
  auto_context_query_variants: ${AUTO_CONTEXT_QUERY_VARIANTS:-5}
  auto_context_llm_refine: ${AUTO_CONTEXT_LLM_REFINE:-true}
  auto_context_llm_notes: ${AUTO_CONTEXT_LLM_NOTES:-true}
  # P-4: default off — enable after an eval gate to let question-type answer
  # modes reconsider the resolved query for context-poor replies.
  answer_mode_consider_resolved_query: ${ANSWER_MODE_CONSIDER_RESOLVED_QUERY:-false}
  contradiction_threshold: 0.35
  nli_enabled: true
  nli_provider: ${NLI_PROVIDER:-hf_api}
  nli_endpoint: ${NLI_ENDPOINT:-}
  nli_model: ${NLI_MODEL:-pritamdeka/PubMedBERT-MNLI-MedNLI}
  nli_panel_enabled: ${NLI_PANEL_ENABLED:-true}
  nli_panel_models: ${NLI_PANEL_MODELS:-pritamdeka/PubMedBERT-MNLI-MedNLI,shidey/deberta-v3-mednli-scifact-open-sentence-nli}
  nli_panel_min_successes: ${NLI_PANEL_MIN_SUCCESSES:-1}
  hf_api_token: ${HF_API_TOKEN:-}
  hf_api_base_url: ${HF_API_BASE_URL:-https://router.huggingface.co/hf-inference/models}
  hf_api_timeout_sec: ${HF_API_TIMEOUT_SEC:-45}
  nli_hf_api_batch_size: ${NLI_HF_API_BATCH_SIZE:-8}
  nli_min_entailment: ${NLI_MIN_ENTAILMENT:-0.55}
  nli_contradiction_threshold: ${NLI_CONTRADICTION_THRESHOLD:-0.45}

re:
  primary: rebel
  rebel_url: "http://rebel-extractor:9007"
  openie6_url: "http://openie6-adapter:9006"
  corenlp_url: "http://corenlp-adapter:9009"
  min_confidence: 0.10

grobid:
  url: http://grobid:8070
  timeout_sec: 60

pdf:
  max_pages: 400
  max_size_mb: 50

csv:
  thresholds:
    subject_ebio_min: 0.70
    subject_ngen_min: 0.70
    object_ebio_min: 0.70
    object_ngen_min: 0.70
    confidence_min: 0.60

antivirus:
  enabled: false
  host: clamav
  port: 3310
  timeout_sec: 5

streaming:
  enable_sse: true
  chunk_bytes: 2048

classification:
  model_id: facebook/bart-large-mnli
  labels: ["has biomedical entity", "has generic noun", "other"]
  batch_size: 32
  max_concurrency: 8

export:
  triples_csv_bucket: papers
  triples_csv_object: triplets_export/triplets.csv
