<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="GUI User Journey and API Mapping">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 z" fill="#284b63"/></marker>
<style>text{font-family:Arial,Helvetica,sans-serif}.title{font-size:30px;font-weight:700;fill:#102a43}.box-title{font-size:18px;font-weight:700;fill:#102a43}.box-body{font-size:13px;fill:#243b53}.label{font-size:13px;font-weight:700;fill:#284b63}.box{fill:#f7fbff;stroke:#2f6f8f;stroke-width:2;rx:8}.accent{fill:#e7f5ec;stroke:#2f855a}.store{fill:#fff8e6;stroke:#b7791f}.gpu{fill:#f3edff;stroke:#6b46c1}</style>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="40" y="48" class="title">GUI User Journey and API Mapping</text>
<rect x="40" y="110" width="190" height="92" class="box"/>
<text x="56" y="138" class="box-title">Login</text>
<text x="56" y="164" class="box-body">Streamlit secrets</text>
<text x="56" y="182" class="box-body">Session auth flag</text>
<rect x="280" y="110" width="210" height="92" class="box"/>
<text x="296" y="138" class="box-title">Search Panel</text>
<text x="296" y="164" class="box-body">Query + Top K</text>
<text x="296" y="182" class="box-body">Results stored in state</text>
<rect x="540" y="110" width="210" height="92" class="box"/>
<text x="556" y="138" class="box-title">Selection Table</text>
<text x="556" y="164" class="box-body">Checkbox selection</text>
<text x="556" y="182" class="box-body">Pinned context items</text>
<rect x="810" y="70" width="190" height="92" class="box"/>
<text x="826" y="98" class="box-title">Chat Tab</text>
<text x="826" y="124" class="box-body">SSE token stream</text>
<text x="826" y="142" class="box-body">Citations after answer</text>
<rect x="810" y="200" width="190" height="92" class="box"/>
<text x="826" y="228" class="box-title">Summary Tab</text>
<text x="826" y="254" class="box-body">Conditioned summary</text>
<text x="826" y="272" class="box-body">Support evidence</text>
<rect x="810" y="330" width="190" height="92" class="box"/>
<text x="826" y="358" class="box-title">Graph Tab</text>
<text x="826" y="384" class="box-body">Confidence filters</text>
<text x="826" y="402" class="box-body">Build graph IDs</text>
<rect x="1050" y="330" width="180" height="92" class="box"/>
<text x="1066" y="358" class="box-title">Graph Viewer</text>
<text x="1066" y="384" class="box-body">Public URL</text>
<text x="1066" y="402" class="box-body">vis-network HTML</text>
<line x1="230" y1="156" x2="280" y2="156" stroke="#284b63" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="490" y1="156" x2="540" y2="156" stroke="#284b63" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="475" y="148" class="label">POST /search/</text>
<line x1="750" y1="145" x2="810" y2="116" stroke="#284b63" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="740" y="122" class="label">POST /chat/</text>
<line x1="750" y1="163" x2="810" y2="246" stroke="#284b63" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="740" y="196" class="label">POST /papers/...</text>
<line x1="750" y1="181" x2="810" y2="376" stroke="#284b63" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="740" y="270" class="label">POST /triplets/graph/build</text>
<line x1="1000" y1="376" x2="1050" y2="376" stroke="#284b63" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="985" y="368" class="label">GET /triplets/graph/view</text>
</svg>
