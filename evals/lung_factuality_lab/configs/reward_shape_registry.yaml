next_allowed_actions:
  - Shape7l cleared saved-live CAF/ECM replay after evaluator and diagnostic-mode fixes; run Sentinel C stratified live guard before broader Stage 2.
  - Improve mechanism-chain evidence retrieval/scoring for required-node coverage and reduce unsupported relation penalties only after replay proves the evaluator is not over-penalizing caveated answers.
